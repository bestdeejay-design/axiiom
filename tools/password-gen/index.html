<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

var UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
var LOWER = 'abcdefghijklmnopqrstuvwxyz';
var DIGITS = '0123456789';
var SPECIAL = '~!@#$%^&*()+';
var AMBIGUOUS = 'Il1oO0oOsS5';

function removeAmbiguous(s) {
    var r = '';
    for (var i = 0; i < s.length; i++) {
        if (AMBIGUOUS.indexOf(s[i]) === -1) r += s[i];
    }
    return r;
}

var passwordList = document.getElementById('passwordList');
var lengthSlider = document.getElementById('lengthSlider');
var lengthDisplay = document.getElementById('lengthDisplay');
var countSlider = document.getElementById('countSlider');
var countDisplay = document.getElementById('countDisplay');
var chkUpper = document.getElementById('chkUpper');
var chkLower = document.getElementById('chkLower');
var chkDigits = document.getElementById('chkDigits');
var chkSpecial = document.getElementById('chkSpecial');
var chkNoAmbiguous = document.getElementById('chkNoAmbiguous');
var sepNone = document.getElementById('sepNone');
var sepHyphen = document.getElementById('sepHyphen');
var sepUnderscore = document.getElementById('sepUnderscore');
var strengthText = document.getElementById('strengthText');
var strengthBar = document.getElementById('strengthBar');
var copyAllBtn = document.getElementById('copyAllBtn');

function getSeparators() {
    if (sepNone.checked) return [];
    var s = [];
    if (sepHyphen.checked) s.push('-');
    if (sepUnderscore.checked) s.push('_');
    return s;
}

// Separator checkbox logic
sepNone.addEventListener('change', function() {
    if (this.checked) {
        sepHyphen.checked = false;
        sepUnderscore.checked = false;
        generatePasswords();
    }
});

sepHyphen.addEventListener('change', function() {
    if (this.checked || sepUnderscore.checked) {
        sepNone.checked = false;
    } else {
        sepNone.checked = true;
    }
    generatePasswords();
});

sepUnderscore.addEventListener('change', function() {
    if (this.checked || sepHyphen.checked) {
        sepNone.checked = false;
    } else {
        sepNone.checked = true;
    }
    generatePasswords();
});

function makePassword() {
    var chars = '';
    if (chkUpper.checked) chars += UPPER;
    if (chkLower.checked) chars += LOWER;
    if (chkDigits.checked) chars += DIGITS;
    if (chkSpecial.checked) chars += SPECIAL;

    if (chkNoAmbiguous.checked) chars = removeAmbiguous(chars);

    if (chars.length === 0) return null;

    var length = parseInt(lengthSlider.value, 10);
    var seps = getSeparators();

    var sets = [];
    if (chkUpper.checked) sets.push(chkNoAmbiguous.checked ? removeAmbiguous(UPPER) : UPPER);
    if (chkLower.checked) sets.push(chkNoAmbiguous.checked ? removeAmbiguous(LOWER) : LOWER);
    if (chkDigits.checked) sets.push(chkNoAmbiguous.checked ? removeAmbiguous(DIGITS) : DIGITS);
    if (chkSpecial.checked) sets.push(SPECIAL);

    // Filter empty sets
    sets = sets.filter(function(s) { return s.length > 0; });
    if (sets.length === 0 || chars.length === 0) return null;

    var password = '';
    for (var i = 0; i < sets.length; i++) {
        password += sets[i].charAt(Math.floor(Math.random() * sets[i].length));
    }
    for (var j = password.length; j < length; j++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    // Shuffle
    var arr = password.split('');
    for (var k = arr.length - 1; k > 0; k--) {
        var m = Math.floor(Math.random() * (k + 1));
        var tmp = arr[k];
        arr[k] = arr[m];
        arr[m] = tmp;
    }

    var result = arr.join('');

    // Apply separators: insert every 4 chars
    if (seps.length > 0) {
        var grouped = '';
        for (var p = 0; p < result.length; p++) {
            if (p > 0 && p % 4 === 0) {
                grouped += seps[Math.floor(Math.random() * seps.length)];
            }
            grouped += result[p];
        }
        result = grouped;
    }

    return result;
}

function generatePasswords() {
    var count = parseInt(countSlider.value, 10);
    var passwords = [];
    var variety = 0;
    if (chkUpper.checked) variety++;
    if (chkLower.checked) variety++;
    if (chkDigits.checked) variety++;
    if (chkSpecial.checked) variety++;

    for (var i = 0; i < count; i++) {
        var pw = makePassword();
        if (pw) passwords.push(pw);
    }

    if (passwords.length === 0) {
        passwordList.innerHTML = '<div class="tool-output" style="text-align:center;color:var(--clr-faint)">Select at least one character set</div>';
        updateStrength(0, 0);
        return;
    }

    var html = '';
    for (var j = 0; j < passwords.length; j++) {
        html += '<div class="password-item" data-pw="' + passwords[j].replace(/"/g, '&quot;') + '">';
        html += '<code class="password-code">' + passwords[j] + '</code>';
        html += '<span class="password-copied-hint">Copied</span>';
        html += '</div>';
    }
    passwordList.innerHTML = html;

    // Click on row = copy
    passwordList.querySelectorAll('.password-item').forEach(function(item) {
        item.addEventListener('click', function() {
            var text = this.getAttribute('data-pw');
            var hint = this.querySelector('.password-copied-hint');
            navigator.clipboard.writeText(text).then(function() {
                hint.classList.add('show');
                setTimeout(function() { hint.classList.remove('show'); }, 1200);
            }).catch(function() {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                hint.classList.add('show');
                setTimeout(function() { hint.classList.remove('show'); }, 1200);
            });
        });
    });

    var pLen = passwords[0] ? (getSeparators().length > 0 ? passwords[0].replace(/[-_]/g, '').length : passwords[0].length) : 0;
    updateStrength(pLen, variety);
}

function updateStrength(length, variety) {
    var score = 0;
    if (length >= 12) score += 40;
    else if (length >= 8) score += 25;
    else score += 10;

    score += variety * 15;

    if (length >= 16 && variety >= 3) score = Math.min(score, 100);
    if (length >= 12 && variety >= 4) score = Math.min(score, 100);

    var pct = 0;
    var label = '—';
    var cssClass = '';

    if (variety === 0 || length === 0) {
        pct = 0;
        label = '—';
        cssClass = '';
    } else if (score < 40) {
        pct = 1;
        label = 'Weak';
        cssClass = 'weak';
    } else if (score < 70) {
        pct = 2;
        label = 'Medium';
        cssClass = 'medium';
    } else {
        pct = 3;
        label = 'Strong';
        cssClass = 'strong';
    }

    var spans = strengthBar.querySelectorAll('span');
    for (var i = 0; i < spans.length; i++) {
        spans[i].className = '';
        if (i < pct) spans[i].classList.add('active', cssClass);
    }

    strengthText.textContent = label;
}

function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(function() {
        var orig = btn.innerHTML;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>';
        setTimeout(function() { btn.innerHTML = orig; }, 1500);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        var orig = btn.innerHTML;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>';
        setTimeout(function() { btn.innerHTML = orig; }, 1500);
    });
}

// Event listeners
lengthSlider.addEventListener('input', function() {
    lengthDisplay.textContent = this.value;
    generatePasswords();
});

countSlider.addEventListener('input', function() {
    countDisplay.textContent = this.value;
    generatePasswords();
});

chkUpper.addEventListener('change', generatePasswords);
chkLower.addEventListener('change', generatePasswords);
chkDigits.addEventListener('change', generatePasswords);
chkSpecial.addEventListener('change', generatePasswords);
chkNoAmbiguous.addEventListener('change', generatePasswords);

document.querySelectorAll('input[name="separator"]').forEach(function(r) {
    r.addEventListener('change', generatePasswords);
});

document.getElementById('generateBtn').addEventListener('click', generatePasswords);

copyAllBtn.addEventListener('click', function() {
    var items = passwordList.querySelectorAll('.password-item');
    if (items.length === 0) return;
    var texts = [];
    items.forEach(function(item) {
        texts.push(item.getAttribute('data-pw'));
    });
    var text = texts.join('\n');
    copyText(text, this);
});

generatePasswords();
</script>
