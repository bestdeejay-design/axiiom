<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

// Tool-specific JS
var UNITS_DATA = {
    length: [
        { id: 'mm', label: 'мм' },
        { id: 'cm', label: 'см' },
        { id: 'm', label: 'м' },
        { id: 'km', label: 'км' },
        { id: 'in', label: 'inch' },
        { id: 'ft', label: 'ft' },
        { id: 'yd', label: 'yd' },
        { id: 'mi', label: 'mile' }
    ],
    mass: [
        { id: 'mg', label: 'mg' },
        { id: 'g', label: 'g' },
        { id: 'kg', label: 'kg' },
        { id: 't', label: 't' },
        { id: 'oz', label: 'oz' },
        { id: 'lb', label: 'lb' }
    ],
    temperature: [
        { id: 'c', label: '°C' },
        { id: 'f', label: '°F' },
        { id: 'k', label: 'K' }
    ],
    volume: [
        { id: 'ml', label: 'mL' },
        { id: 'l', label: 'L' },
        { id: 'm3', label: 'm³' },
        { id: 'gal', label: 'gal' },
        { id: 'floz', label: 'fl oz' }
    ],
    speed: [
        { id: 'ms', label: 'm/s' },
        { id: 'kmh', label: 'km/h' },
        { id: 'mph', label: 'mph' },
        { id: 'kt', label: 'kn' }
    ],
    area: [
        { id: 'mm2', label: 'mm²' },
        { id: 'cm2', label: 'cm²' },
        { id: 'm2', label: 'm²' },
        { id: 'ha', label: 'ha' },
        { id: 'km2', label: 'km²' },
        { id: 'ac', label: 'acre' }
    ],
    pressure: [
        { id: 'pa', label: 'Pa' },
        { id: 'kpa', label: 'kPa' },
        { id: 'bar', label: 'bar' },
        { id: 'atm', label: 'atm' },
        { id: 'mmhg', label: 'mmHg' },
        { id: 'psi', label: 'psi' }
    ]
};

var TO_BASE = {
    length: { mm: 0.001, cm: 0.01, m: 1, km: 1000, in: 0.0254, ft: 0.3048, yd: 0.9144, mi: 1609.344 },
    mass: { mg: 0.001, g: 1, kg: 1000, t: 1000000, oz: 28.3495, lb: 453.592 },
    volume: { ml: 0.001, l: 1, m3: 1000, gal: 3.78541, floz: 0.0295735 },
    speed: { ms: 1, kmh: 0.277778, mph: 0.44704, kt: 0.514444 },
    area: { mm2: 0.000001, cm2: 0.0001, m2: 1, ha: 10000, km2: 1000000, ac: 4046.86 },
    pressure: { pa: 1, kpa: 1000, bar: 100000, atm: 101325, mmhg: 133.322, psi: 6894.76 }
};

var FROM_BASE = {
    length: { mm: 1000, cm: 100, m: 1, km: 0.001, in: 39.3701, ft: 3.28084, yd: 1.09361, mi: 0.000621371 },
    mass: { mg: 1000, g: 1, kg: 0.001, t: 0.000001, oz: 0.035274, lb: 0.00220462 },
    volume: { ml: 1000, l: 1, m3: 0.001, gal: 0.264172, floz: 33.814 },
    speed: { ms: 1, kmh: 3.6, mph: 2.23694, kt: 1.94384 },
    area: { mm2: 1000000, cm2: 10000, m2: 1, ha: 0.0001, km2: 0.000001, ac: 0.000247105 },
    pressure: { pa: 1, kpa: 0.001, bar: 0.00001, atm: 0.00000986923, mmhg: 0.00750062, psi: 0.000145038 }
};

var categoryEl = document.getElementById('category');
var valueEl = document.getElementById('value');
var fromEl = document.getElementById('fromUnit');
var toEl = document.getElementById('toUnit');
var resultEl = document.getElementById('result');

function populateUnits() {
    var cat = categoryEl.value;
    var list = UNITS_DATA[cat];
    var prevFrom = fromEl.value;
    var prevTo = toEl.value;
    fromEl.innerHTML = '';
    toEl.innerHTML = '';
    for (var i = 0; i < list.length; i++) {
        var u = list[i];
        fromEl.innerHTML += '<option value="' + u.id + '">' + u.label + '</option>';
        toEl.innerHTML += '<option value="' + u.id + '">' + u.label + '</option>';
    }
    var fromFound = false;
    var toFound = false;
    for (var j = 0; j < list.length; j++) {
        if (list[j].id === prevFrom) fromFound = true;
        if (list[j].id === prevTo) toFound = true;
    }
    if (fromFound) fromEl.value = prevFrom;
    else if (list.length > 1) fromEl.value = list[1].id;
    if (toFound) toEl.value = prevTo;
    else if (list.length > 0) toEl.value = list[0].id;
    convert();
}

function convert() {
    var cat = categoryEl.value;
    var from = fromEl.value;
    var to = toEl.value;
    var val = parseFloat(valueEl.value);

    if (isNaN(val) || !from || !to) {
        resultEl.textContent = '—';
        return;
    }

    var result;
    if (cat === 'temperature') {
        result = convertTemperature(from, to, val);
    } else {
        var baseVal = val * TO_BASE[cat][from];
        result = baseVal * FROM_BASE[cat][to];
    }

    var formatted = result % 1 === 0 ? result.toString() : result.toFixed(10).replace(/\.?0+$/, '');
    resultEl.textContent = formatted;
}

function convertTemperature(from, to, val) {
    var celsius;
    if (from === 'c') celsius = val;
    else if (from === 'f') celsius = (val - 32) * 5 / 9;
    else celsius = val - 273.15;

    if (to === 'c') return celsius;
    if (to === 'f') return celsius * 9 / 5 + 32;
    return celsius + 273.15;
}

categoryEl.addEventListener('change', populateUnits);
valueEl.addEventListener('input', convert);
fromEl.addEventListener('change', convert);
toEl.addEventListener('change', convert);

populateUnits();
</script>
