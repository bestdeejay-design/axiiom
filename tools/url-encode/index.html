  </svg>

<div class="noise"></div>

<div id="header-mount"></div>


<section class="tool-page">
    <div class="container">
        <div class="tool-page-header">
            <h1>URL Encode</h1>
            <button class="share-btn" onclick="copyPageUrl(this)" aria-label="Share" title="Share">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
                    <polyline points="16 6 12 2 8 6"/>
                    <line x1="12" y1="2" x2="12" y2="15"/>
                </svg>
                <span class="share-tooltip">Link copied</span>
            </button>
            
            
        </div>
        <div class="tool-page-card">
            <p class="tool-description">Encode and decode URL strings, escape special characters.</p>

            <div class="tool-row">
                <label class="tool-label" for="input">String to Convert</label>
                <textarea class="tool-textarea" id="input" placeholder="Enter a URL string to encode or decode..." rows="4"></textarea>
            </div>

            <div class="tool-btn-group">
                <button class="tool-btn" id="encodeBtn">Encode</button>
                <button class="tool-btn-secondary" id="decodeBtn">Decode</button>
            </div>

            <div class="tool-row" style="margin-top:20px">
                <div style="display:flex;align-items:center;justify-content:space-between">
                    <span class="tool-output-label">Result</span>
                    <button class="tool-btn-secondary copy-btn" id="copyBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        Copy
                    </button>
                </div>

            </div>
        </div>
    </div>
</section>

    <div class="container">
        
        <div id="footerCopy"></div>
    </div>
</footer>

<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

var input = document.getElementById('input');
var output = document.getElementById('output');
var encodeBtn = document.getElementById('encodeBtn');
var decodeBtn = document.getElementById('decodeBtn');
var copyBtn = document.getElementById('copyBtn');

encodeBtn.addEventListener('click', function() {
    try {
        output.textContent = encodeURIComponent(input.value);
    } catch (e) {
        output.textContent = 'Encoding error';
    }
});

decodeBtn.addEventListener('click', function() {
    try {
        output.textContent = decodeURIComponent(input.value);
    } catch (e) {
        output.textContent = 'Decoding error — check the string';
    }
});

copyBtn.addEventListener('click', function() {
    var text = output.textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.classList.remove('copied'); }, 2000);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.classList.remove('copied'); }, 2000);
    });
});
</script>
