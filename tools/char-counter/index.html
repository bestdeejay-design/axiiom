<div id="preloader">
<svg class="preloader-svg" viewBox="0 0 36 36" width="80" height="80">
    <rect class="pr1" x="2" y="2" width="14" height="14" rx="2"/>
    <rect class="pr2" x="20" y="2" width="14" height="14" rx="2"/>

  </svg>
</div>
<div class="noise"></div>

<div id="header-mount"></div>


<div class="tool-page">
    <div class="container">
        <div class="tool-page-header">
            <h1>Character Counter</h1>
            <button class="share-btn" onclick="copyPageUrl(this)" aria-label="Share" title="Share">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
                    <polyline points="16 6 12 2 8 6"/>
                    <line x1="12" y1="2" x2="12" y2="15"/>
                </svg>
                <span class="share-tooltip">Link copied</span>
            </button>
            
            
        </div>

        <div class="tool-page-card">
            <p class="tool-description">Real-time counting of characters, words, sentences and other text parameters.</p>

            <div class="tool-row">
                <textarea class="tool-textarea" id="textInput" placeholder="Paste or type your text..." rows="10"></textarea>
            </div>

            <div class="tool-btn-group">
                <button class="tool-btn" id="clearBtn">Clear</button>
                <button class="tool-btn-secondary copy-btn" id="copyBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    Copy
                </button>
            </div>

            <div class="stat-row">
                <div class="stat-value">
                    <span id="statChars">0</span>
                    <span>Characters (with spaces)</span>
                </div>
                <div class="stat-value">
                    <span id="statCharsNoSpace">0</span>
                    <span>Characters (no spaces)</span>
                </div>
                <div class="stat-value">
                    <span id="statWords">0</span>
                    <span>Words</span>
                </div>
                <div class="stat-value">
                    <span id="statSentences">0</span>
                    <span>Sentences</span>
                </div>
                <div class="stat-value">
                    <span id="statParagraphs">0</span>
                    <span>Paragraphs</span>
                </div>
                <div class="stat-value">
                    <span id="statDigits">0</span>
                    <span>Digits</span>
                </div>
                <div class="stat-value">
                    <span id="statAvgWordLength">0</span>
                    <span>Avg. Word Length</span>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        
        <div id="footerCopy"></div>
    </div>
</footer>

<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

var textInput = document.getElementById('textInput');

function updateStats() {
    var text = textInput.value;
    document.getElementById('statChars').textContent = text.length;
    document.getElementById('statCharsNoSpace').textContent = text.replace(/\s/g, '').length;

    var words = text.trim() ? text.trim().split(/\s+/).length : 0;
    document.getElementById('statWords').textContent = words;

    var sentences = text ? (text.match(/[.!?…]+/g) || []).length : 0;
    if (text.trim() && !/[.!?…]/.test(text.trim().slice(-1))) sentences = Math.max(1, sentences);
    document.getElementById('statSentences').textContent = sentences;

    var paragraphs = text ? text.split(/\n\s*\n/).filter(function(b) { return b.trim().length > 0; }).length : 0;
    if (text.trim() && paragraphs === 0 && text.includes('\n')) paragraphs = 1;
    if (text.trim() && !text.includes('\n')) paragraphs = text.trim() ? 1 : 0;
    document.getElementById('statParagraphs').textContent = paragraphs;

    var digits = (text.match(/\d/g) || []).length;
    document.getElementById('statDigits').textContent = digits;

    var avgLen = 0;
    if (words > 0) {
        var totalChars = text.trim().split(/\s+/).reduce(function(sum, w) { return sum + w.length; }, 0);
        avgLen = (totalChars / words).toFixed(1);
    }
    document.getElementById('statAvgWordLength').textContent = avgLen;
}

textInput.addEventListener('input', updateStats);

document.getElementById('clearBtn').addEventListener('click', function() {
    textInput.value = '';
    updateStats();
    textInput.focus();
});

document.getElementById('copyBtn').addEventListener('click', function() {
    if (!textInput.value) return;
    var btn = this;
    navigator.clipboard.writeText(textInput.value).then(function() {
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1800);
    }).catch(function() {
        textInput.select();
        document.execCommand('copy');
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1800);
    });
});

updateStats();
</script>
