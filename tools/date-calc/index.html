<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

// --- Date Calc Logic ---
function pad(n) { return String(n).padStart(2, '0'); }

function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}

// Mode 1: Difference
var formDiff = document.getElementById('formDiff');
var resultDiff = document.getElementById('resultDiff');

formDiff.addEventListener('submit', function(e) {
    e.preventDefault();
    var startVal = document.getElementById('startDate').value;
    var endVal = document.getElementById('endDate').value;
    if (!startVal || !endVal) return;

    var start = new Date(startVal + 'T00:00:00');
    var end = new Date(endVal + 'T00:00:00');
    if (isNaN(start.getTime()) || isNaN(end.getTime())) return;

    var diffMs = Math.abs(end - start);
    var diffMinutes = Math.floor(diffMs / 60000);
    var diffHours = Math.floor(diffMinutes / 60);
    var totalDays = Math.floor(diffHours / 24);
    var totalWeeks = (totalDays / 7).toFixed(1);

    var y1 = start.getFullYear(), m1 = start.getMonth(), d1 = start.getDate();
    var y2 = end.getFullYear(), m2 = end.getMonth(), d2 = end.getDate();

    var years = y2 - y1;
    var months = m2 - m1;
    var days = d2 - d1;

    if (days < 0) {
        months--;
        var prevMonth = new Date(y2, m2, 0);
        days += prevMonth.getDate();
    }
    if (months < 0) {
        years--;
        months += 12;
    }
    if (years < 0) {
        years = 0; months = 0; days = totalDays;
    }

    var remHours = diffHours % 24;
    var remMinutes = diffMinutes % 60;

    document.getElementById('diffYears').textContent = years;
    document.getElementById('diffMonths').textContent = months;
    document.getElementById('diffDays').textContent = days;
    document.getElementById('diffHours').textContent = remHours;
    document.getElementById('diffMinutes').textContent = remMinutes;
    document.getElementById('diffTotalDays').textContent = totalDays;
    document.getElementById('diffTotalWeeks').textContent = totalWeeks;
    resultDiff.style.display = 'block';
});

// Mode 2: Add / Subtract
var formAddsub = document.getElementById('formAddsub');
var resultAddsub = document.getElementById('resultAddsub');

formAddsub.addEventListener('submit', function(e) {
    e.preventDefault();
    var refVal = document.getElementById('refDate').value;
    var offsetVal = document.getElementById('daysOffset').value;
    if (!refVal || offsetVal === '') return;

    var ref = new Date(refVal + 'T12:00:00');
    if (isNaN(ref.getTime())) return;

    var offset = parseInt(offsetVal, 10);
    if (isNaN(offset)) return;

    ref.setDate(ref.getDate() + offset);

    var y = ref.getFullYear();
    var m = pad(ref.getMonth() + 1);
    var d = pad(ref.getDate());
    var formatted = y + '-' + m + '-' + d;

    document.getElementById('addsubResult').textContent = formatted;
    resultAddsub.style.display = 'block';
});

// Set defaults
var ts = todayStr();
if (document.getElementById('startDate')) document.getElementById('startDate').value = ts;
if (document.getElementById('endDate')) document.getElementById('endDate').value = ts;
if (document.getElementById('refDate')) document.getElementById('refDate').value = ts;
</script>
