</section>

<script>
function copyPageUrl(btn) {
    var url = window.location.href;
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '0';
    ta.style.top = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.background = 'transparent';
    ta.style.color = 'transparent';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var tip = btn.querySelector('.share-tooltip');
    if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>

<script>
var cursor = document.createElement('div');
cursor.className = 'cursor-glow';
document.body.appendChild(cursor);
document.addEventListener('mousemove', function(e) {
    cursor.style.transform = 'translate(' + (e.clientX - 400) + 'px, ' + (e.clientY - 400) + 'px)';
});

function b64Encode(str) {
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(_, p1) { return String.fromCharCode(parseInt(p1, 16)); }));
}

function b64Decode(str) {
    return decodeURIComponent(atob(str).split('').map(function(c) { return '%' + c.charCodeAt(0).toString(16).padStart(2, '0'); }).join(''));
}

var input = document.getElementById('inputText');
var output = document.getElementById('output');
var encodeBtn = document.getElementById('encodeBtn');
var decodeBtn = document.getElementById('decodeBtn');
var copyBtn = document.getElementById('copyBtn');

encodeBtn.addEventListener('click', function() {
    try {
        output.textContent = b64Encode(input.value);
    } catch (e) {
        output.textContent = 'Encoding error: ' + e.message;
    }
});

decodeBtn.addEventListener('click', function() {
    var val = input.value.trim();
    if (!val) {
        output.textContent = 'Enter a Base64 string to decode.';
        return;
    }
    try {
        output.textContent = b64Decode(val);
    } catch (e) {
        output.textContent = 'Error: invalid Base64 string. Check your input.';
    }
});

copyBtn.addEventListener('click', function() {
    var text = output.textContent;
    if (!text || text === 'Encoding error: ' || text.startsWith('Error')) return;
    navigator.clipboard.writeText(text).then(function() {
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.classList.remove('copied'); }, 2000);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtn.classList.add('copied');
        setTimeout(function() { copyBtn.classList.remove('copied'); }, 2000);
    });
});
</script>
