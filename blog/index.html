<script>
function copyPageUrl(btn) {
  var url = window.location.href;
  var ta = document.createElement('textarea');
  ta.value = url; ta.style.position = 'fixed'; ta.style.left = '0'; ta.style.top = '0';
  ta.style.width = '2em'; ta.style.height = '2em'; ta.style.padding = '0';
  ta.style.border = 'none'; ta.style.outline = 'none';
  ta.style.background = 'transparent'; ta.style.color = 'transparent';
  document.body.appendChild(ta); ta.focus(); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  var tip = btn.querySelector('.share-tooltip');
  if (tip) { tip.classList.add('show'); setTimeout(function() { tip.classList.remove('show'); }, 2000); }
}
</script>
